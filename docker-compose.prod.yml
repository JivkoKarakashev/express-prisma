services:
# PostgreSQL Service
  postgres:
    env_file:
      - .env.production

# Express API Service
  express-api:
    env_file:
      - .env.production
    ports:
      - "80:3000" # Expose Express on port 3000
      # - "8080:5555" # Expose Prisma Studio on port 5555
    command: sh -c "npx prisma migrate deploy && node dist/index.js"